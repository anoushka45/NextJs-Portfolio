<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>CortexKitchen — LinkedIn poster v2</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #06080F;
    --bg-2: #0B1020;
    --panel: #0E1422;
    --panel-2: #121A2C;
    --border: #1C2540;
    --border-2: #283457;
    --ink: #F2EEE6;
    --ink-2: #B4BAC8;
    --ink-3: #6B7390;
    --ink-4: #4A506B;
    --amber: #E89B5A;
    --amber-2: #F5C58A;
    --amber-3: #C97A38;
    --green: #34D399;
    --green-2: #6EE7B7;
    --cyan: #67C6E0;
    --pink: #EE6E8E;
    --yellow: #E8B85A;
    --teal: #5DD39E;
    --violet: #9A82FF;
    --red: #F87171;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #050709; }

  body {
    color: var(--ink);
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }

  /* Fit to width, allow vertical scroll */
  .stage {
    width: 100vw;
    display: flex; justify-content: center;
    background: #050709;
    padding: 0;
  }
  .poster {
    width: 1080px;
    transform-origin: top center;
    background:
      radial-gradient(ellipse 900px 600px at 80% 4%, rgba(232,155,90,0.10), transparent 60%),
      radial-gradient(ellipse 1200px 800px at 10% 40%, rgba(232,155,90,0.03), transparent 60%),
      radial-gradient(ellipse 900px 600px at 90% 75%, rgba(232,155,90,0.04), transparent 60%),
      linear-gradient(180deg, #07090F 0%, #060810 100%);
    position: relative;
  }

  /* Grid texture */
  .poster::before {
    content: "";
    position: absolute; inset: 0;
    background-image:
      linear-gradient(to right, rgba(255,255,255,0.014) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.014) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }

  .frame {
    position: relative;
    z-index: 2;
    padding: 56px 60px 52px;
    display: flex;
    flex-direction: column;
    gap: 56px;
  }

  /* ============ HEADER ============ */
  .header {
    display: flex; align-items: center; justify-content: space-between;
  }
  .brand { display: flex; align-items: center; gap: 14px; }
  .brand .logo {
    width: 48px; height: 48px;
    border-radius: 11px;
    background: #0a0c14;
    border: 1px solid #1d2238;
    display: grid; place-items: center;
    overflow: hidden;
  }
  .brand .logo img { width: 36px; height: 36px; object-fit: contain; }
  .brand .name { font-weight: 700; font-size: 19px; letter-spacing: -0.01em; line-height: 1.1; }
  .brand .sub  { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--amber); letter-spacing: 0.18em; margin-top: 4px; }

  .pill {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 7px 13px;
    border: 1px solid rgba(232,155,90,0.35);
    border-radius: 999px;
    background: linear-gradient(180deg, rgba(232,155,90,0.10), rgba(232,155,90,0.02));
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--amber-2);
    letter-spacing: 0.16em;
  }
  .pill .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--amber);
    box-shadow: 0 0 12px rgba(232,155,90,0.7);
  }

  /* ============ HERO ============ */
  .hero { display: flex; flex-direction: column; gap: 0; }
  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--amber);
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }

  .hero h1 {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 88px;
    line-height: 0.94;
    letter-spacing: -0.035em;
    margin: 18px 0 0;
    color: var(--ink);
  }
  .hero h1 .it {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-weight: 400;
    color: var(--amber-2);
    letter-spacing: -0.02em;
  }
  .hero p.lede {
    margin: 24px 0 0;
    max-width: 880px;
    font-size: 19px;
    line-height: 1.55;
    color: var(--ink-2);
  }
  .hero p.lede b { color: var(--ink); font-weight: 600; }

  .verdict-badge {
    margin-top: 24px;
    display: inline-flex; align-items: stretch;
    border: 1px solid #1f2c44;
    background: linear-gradient(180deg, rgba(52,211,153,0.06), rgba(52,211,153,0.015));
    border-radius: 10px;
    overflow: hidden;
    font-family: 'JetBrains Mono', monospace;
    align-self: flex-start;
  }
  .verdict-badge .vleft {
    padding: 12px 16px;
    color: var(--green-2);
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; letter-spacing: 0.16em;
    border-right: 1px solid #1f2c44;
  }
  .verdict-badge .vleft .ldot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); box-shadow: 0 0 10px var(--green); }
  .verdict-badge .vright {
    padding: 12px 18px;
    display: flex; align-items: center; gap: 14px;
    font-size: 12px; letter-spacing: 0.16em; color: var(--ink-2);
  }
  .verdict-badge .vright b { color: var(--ink); font-weight: 600; }
  .verdict-badge .vright .num { color: var(--green-2); font-size: 13px; }

  /* ============ SECTION HEADER ============ */
  .section { display: flex; flex-direction: column; gap: 22px; }
  .shead { display: flex; align-items: end; justify-content: space-between; padding-bottom: 18px; border-bottom: 1px solid var(--border); }
  .shead-left { display: flex; flex-direction: column; gap: 6px; }
  .shead-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--amber); letter-spacing: 0.24em;
  }
  .shead h2 {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 40px;
    line-height: 1.0;
    letter-spacing: -0.025em;
    margin: 0;
  }
  .shead h2 .it {
    font-family: 'Instrument Serif', serif; font-style: italic;
    color: var(--amber-2); font-weight: 400; padding: 0 4px;
    font-size: 44px;
  }
  .shead .meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--ink-3); letter-spacing: 0.16em;
    text-align: right;
    line-height: 1.5;
  }

  /* ============ PIPELINE DIAGRAM ============ */
  .pipeline {
    position: relative;
    border: 1px solid var(--border);
    border-radius: 14px;
    background:
      radial-gradient(ellipse 600px 200px at 50% 0%, rgba(232,155,90,0.06), transparent 70%),
      linear-gradient(180deg, #0B111E 0%, #080C16 100%);
    padding: 26px 26px 26px;
  }

  .graph {
    display: grid;
    grid-template-columns: 168px 28px 168px 28px 1fr 28px 168px;
    gap: 0;
    align-items: center;
  }
  .col { display: flex; flex-direction: column; gap: 9px; }
  .col-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--ink-3); letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .node {
    border: 1px solid var(--border);
    background: linear-gradient(180deg, #0F1626 0%, #0A1020 100%);
    border-radius: 10px;
    padding: 13px 14px;
    position: relative;
  }
  .node h3 {
    margin: 0; font-size: 14px; font-weight: 600; letter-spacing: -0.005em;
    display: flex; align-items: center; gap: 8px;
  }
  .node h3 .ndot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .node p {
    margin: 5px 0 0;
    font-size: 11px; line-height: 1.4; color: var(--ink-3);
  }
  .node .tag {
    margin-top: 8px;
    display: inline-block;
    padding: 3px 7px;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; letter-spacing: 0.12em;
    background: rgba(232,155,90,0.1);
    color: var(--amber-2);
    border: 1px solid rgba(232,155,90,0.2);
  }

  .node.cyan { border-color: rgba(103,198,224,0.25); }
  .node.cyan h3 .ndot { background: var(--cyan); box-shadow: 0 0 8px var(--cyan); }
  .node.pink { border-color: rgba(238,110,142,0.25); background: linear-gradient(180deg, #181020 0%, #0E0915 100%); }
  .node.pink h3 .ndot { background: var(--pink); box-shadow: 0 0 8px var(--pink); }
  .node.yellow { border-color: rgba(232,184,90,0.25); }
  .node.yellow h3 .ndot { background: var(--yellow); box-shadow: 0 0 8px var(--yellow); }
  .node.teal { border-color: rgba(93,211,158,0.25); }
  .node.teal h3 .ndot { background: var(--teal); box-shadow: 0 0 8px var(--teal); }
  .node.amber { border-color: rgba(232,155,90,0.3); }
  .node.amber h3 .ndot { background: var(--amber); box-shadow: 0 0 8px var(--amber); }
  .node.green { border-color: rgba(52,211,153,0.3); }
  .node.green h3 .ndot { background: var(--green); box-shadow: 0 0 8px var(--green); }

  .connector { height: 100%; display: flex; align-items: center; justify-content: center; }
  .connector svg { width: 100%; height: 100%; }

  .pipeline-foot {
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px dashed var(--border);
    display: flex; justify-content: space-between; align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px; color: var(--ink-3); letter-spacing: 0.14em;
  }
  .pipeline-foot .checks { display: flex; gap: 8px; flex-wrap: wrap; }
  .pipeline-foot .check {
    padding: 5px 10px; border-radius: 999px;
    border: 1px solid #1d2640; background: #0B111F;
    color: var(--green-2);
    font-size: 10px; letter-spacing: 0.14em;
  }

  /* ============ STAT STRIP ============ */
  .stats {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }
  .stat {
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    background: linear-gradient(180deg, #0C1322 0%, #080D18 100%);
  }
  .stat .k {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.2em;
    color: var(--ink-3);
    text-transform: uppercase;
  }
  .stat .v {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 48px;
    letter-spacing: -0.035em;
    color: var(--ink);
    margin-top: 6px;
    line-height: 1;
  }
  .stat .v .unit {
    font-family: 'Instrument Serif', serif; font-style: italic;
    color: var(--amber-2);
    font-weight: 400; font-size: 32px;
  }
  .stat .s {
    margin-top: 8px;
    font-size: 12px; color: var(--ink-3);
  }

  /* ============ SCREENSHOTS ============ */
  .shot {
    position: relative;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    background: #0A0E18;
  }
  .shot img { width: 100%; height: auto; display: block; }
  .shot .caption {
    position: absolute; left: 12px; bottom: 12px;
    padding: 6px 11px;
    border-radius: 999px;
    background: rgba(8,12,22,0.85);
    backdrop-filter: blur(6px);
    border: 1px solid #1d2640;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px; color: var(--ink-2); letter-spacing: 0.12em;
  }
  .shot .caption b { color: var(--amber-2); font-weight: 500; }

  /* ============ AGENT CARDS ============ */
  .agents {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
  }
  .agent {
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 16px 20px;
    background: linear-gradient(180deg, #0C1322 0%, #080D18 100%);
    position: relative;
    overflow: hidden;
  }
  .agent::before {
    content: "";
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: var(--c);
    opacity: 0.6;
  }
  .agent .anum {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--c); letter-spacing: 0.2em;
    margin-bottom: 12px;
  }
  .agent h4 {
    margin: 0; font-size: 15px; font-weight: 600;
    letter-spacing: -0.01em; line-height: 1.15;
  }
  .agent p {
    margin: 8px 0 0;
    font-size: 11.5px; line-height: 1.45;
    color: var(--ink-3);
  }
  .agent .meta {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px dashed var(--border);
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px; color: var(--ink-3); letter-spacing: 0.12em;
  }

  /* ============ CRITIC ============ */
  .critic-grid {
    display: grid; grid-template-columns: 1.1fr 1fr;
    gap: 18px;
  }
  .critic-card {
    border: 1px solid rgba(52,211,153,0.25);
    border-radius: 14px;
    padding: 22px 24px;
    background:
